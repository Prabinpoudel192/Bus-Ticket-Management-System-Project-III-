<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bus Ticket System</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="/javascript/style.js"></script>
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="logo"><img src="/images/logo.png" alt="logo"></div>
    <div class="nav-actions">
      <button onclick="raja()">Login</button>
      <button class="primary">Register</button>
    </div>
  </header>
  <section class="hero">
    <div class="search-card">
      <h1>Find Your Bus Ticket</h1>

      <div class="inputs">
        <input type="text" placeholder="From (City)">
        <input type="text" placeholder="To (City)">
        <input type="date">
      </div>

      <button onclick="searchBuses()">Search Buses</button>
    </div>
  </section>
  <section class="results" id="results"></section>

  <script defer src="script.js"></script>
</body>
</html>
